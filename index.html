<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>GreenBoost</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #ecf9f1;
  text-align: center;
}
header {
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  color: white;
  padding: 25px;
}
#produkty {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}
.produkt {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}
#shrnutí {
  background: white;
  margin: 20px auto;
  padding: 15px;
  width: 250px;
  border-radius: 10px;
}
</style>

</head>
<body>

<header>
  <h1>🥗 GreenBoost</h1>
  <p>Fresh saláty & smoothies ⚡</p>
</header>

<section id="produkty"></section>

<h2>🛒 Objednávka</h2>

<div id="shrnutí">
  <p>Počet kusů: <b id="kusy">0</b></p>
  <p>Celková cena: <b id="cena">0</b> Kč</p>
</div>

<script>

let produkty = [];

// ✅ načtení CSV
fetch("produkty.csv")
  .then(response => response.text())
  .then(data => {
    const radky = data.trim().split("\n");

    radky.shift(); // odstraní hlavičku

    const container = document.getElementById("produkty");

    radky.forEach((radek, index) => {
      const [nazev, cena] = radek.split(";");

      produkty.push({ nazev, cena: parseInt(cena), kusy: 0 });

      const div = document.createElement("div");
      div.className = "produkt";

      div.innerHTML = `
        <h3>${nazev}</h3>
        <p>${cena} Kč</p>
        <input type="number" min="0" value="0" onchange="zmena(${index}, this.value)">
      `;

      container.appendChild(div);
    });
  });

// ✅ přepočet ceny
function zmena(index, hodnota) {
  produkty[index].kusy = parseInt(hodnota) || 0;

  let celkemKusu = 0;
  let celkovaCena = 0;

  produkty.forEach(p => {
    celkemKusu += p.kusy;
    celkovaCena += p.kusy * p.cena;
  });

  document.getElementById("kusy").innerText = celkemKusu;
  document.getElementById("cena").innerText = celkovaCena;
}

</script>

</body>
</html>
